<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161c2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pickaxe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient border -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" opacity="0.9"/>
  
  <!-- Inner dark circle -->
  <circle cx="60" cy="60" r="52" fill="url(#inner)"/>
  
  <!-- Pickaxe head (top part) -->
  <path d="M38 42 L60 28 L82 42" stroke="url(#pickaxe)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  
  <!-- Pickaxe handle -->
  <line x1="60" y1="28" x2="60" y2="78" stroke="url(#pickaxe)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Pickaxe left point -->
  <path d="M38 42 L28 52" stroke="url(#spark)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Pickaxe right point -->
  <path d="M82 42 L92 52" stroke="url(#spark)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Sparkles -->
  <circle cx="25" cy="38" r="2" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
  <circle cx="95" cy="38" r="2" fill="#818cf8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="32" cy="28" r="1.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="88" cy="28" r="1.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="20" cy="48" r="1" fill="#22d3ee" opacity="0.6"/>
  <circle cx="100" cy="48" r="1" fill="#818cf8" opacity="0.6"/>
  
  <!-- N letter at bottom -->
  <text x="60" y="92" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="800" font-size="16" fill="url(#pickaxe)" letter-spacing="1">N</text>
  
  <!-- Bottom accent line -->
  <line x1="42" y1="98" x2="78" y2="98" stroke="url(#spark)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
