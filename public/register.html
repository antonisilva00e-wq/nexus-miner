<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Miner - Cadastro</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0;
    }
    .bg-orb-1 { width: 400px; height: 400px; background: rgba(99,102,241,0.15); top: -100px; right: -100px; }
    .bg-orb-2 { width: 300px; height: 300px; background: rgba(236,72,153,0.1); bottom: -80px; left: -80px; }

    .register-container {
      position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px;
    }
    .register-card {
      background: rgba(15,15,35,0.8);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(99,102,241,0.08);
    }
    .register-logo {
      text-align: center; margin-bottom: 32px;
    }
    .register-logo img { width: 64px; height: 64px; margin-bottom: 12px; }
    .register-logo h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }
    .register-logo .subtitle { color: #94a3b8; font-size: 0.9rem; margin-top: 4px; }
    .register-logo .ref-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
      border-radius: 20px; padding: 4px 14px; margin-top: 12px;
      color: #10b981; font-size: 0.8rem; font-weight: 600;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; color: #94a3b8; font-size: 0.82rem; margin-bottom: 6px; font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 10px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .form-group input::placeholder { color: #475569; }
    .form-group select { cursor: pointer; }
    .form-group select option { background: #1a1a2e; color: #fff; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn-register {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s; margin-top: 8px;
    }
    .btn-register:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.3); }
    .btn-register:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      display: none; background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.2);
      border-radius: 8px; padding: 10px 14px; color: #f43f5e; font-size: 0.85rem; margin-top: 12px;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      display: none; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
      border-radius: 8px; padding: 14px; text-align: center; margin-top: 12px;
    }
    .success-msg.visible { display: block; }
    .success-msg h3 { color: #10b981; font-size: 1.1rem; margin-bottom: 4px; }
    .success-msg p { color: #94a3b8; font-size: 0.85rem; }

    .login-link {
      text-align: center; margin-top: 20px; color: #64748b; font-size: 0.85rem;
    }
    .login-link a { color: #818cf8; text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="register-container">
    <div class="register-card">
      <div class="register-logo">
        <img src="/assets/logo.svg" alt="Nexus Miner">
        <h1>Nexus Miner</h1>
        <p class="subtitle">Crie sua conta e comece a minerar leads</p>
        <div class="ref-badge" id="ref-badge" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></svg>
          Indicado por: <span id="ref-name"></span>
        </div>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="reg-name" placeholder="Seu nome completo" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="reg-username" placeholder="Escolha um usuario" required>
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="reg-password" placeholder="Min. 8 caracteres" required minlength="8">
          </div>
        </div>
        <div class="form-group">
          <label>Plano</label>
          <select id="reg-plan">
            <option value="Gratuito">Gratuito (50 leads)</option>
            <option value="Pro">Pro - R$97/mes (500 leads)</option>
            <option value="Enterprise">Enterprise - R$297/mes (ilimitado)</option>
          </select>
        </div>

        <button type="submit" class="btn-register" id="reg-btn">Criar Minha Conta</button>

        <div class="error-msg" id="reg-error"></div>
        <div class="success-msg" id="reg-success">
          <h3>Conta criada com sucesso!</h3>
          <p>Redirecionando para o login...</p>
        </div>
      </form>

      <div class="login-link">
        Ja tem uma conta? <a href="/#/">Entrar</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Extract ref code from URL
      const params = new URLSearchParams(window.location.search);
      const refCode = params.get('ref');

      if (refCode) {
        document.getElementById('ref-badge').style.display = 'inline-flex';
        document.getElementById('ref-name').textContent = refCode;
      }

      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');
        const errorEl = document.getElementById('reg-error');
        const successEl = document.getElementById('reg-success');

        errorEl.classList.remove('visible');
        successEl.classList.remove('visible');

        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const plan = document.getElementById('reg-plan').value;

        if (!name || !email || !username || !password) {
          errorEl.textContent = 'Preencha todos os campos';
          errorEl.classList.add('visible');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Criando conta...';

        try {
          const body = { name, email, username, password, plan };
          if (refCode) body.code = refCode;

          const res = await fetch('/api/referrals/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Erro ao criar conta');

          successEl.classList.add('visible');
          btn.textContent = 'Conta criada!';

          setTimeout(() => { window.location.href = '/#/'; }, 2000);
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Criar Minha Conta';
        }
      });
    })();
  </script>
</body>
</html>
